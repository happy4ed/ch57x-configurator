name: build-windows-app

# 코드가 push 되면 윈도우에서 자동 빌드 → 단독 실행파일(.exe) 생성.
# 사용자는 Actions 실행 결과의 Artifacts 에서 zip 을 받아 풀고 .exe 더블클릭만 하면 됨.
on:
  push:
    branches: [ master ]
    paths: [ 'windows/**', '.github/workflows/build.yml' ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ──────── Slim: framework-dependent (~5MB).
      # 실행하려면 PC 에 .NET 8 Desktop Runtime 필요(없으면 윈도우가 자동 다운로드 안내).
      - name: Publish slim (framework-dependent)
        run: >
          dotnet publish windows/Ch57x.App/Ch57x.App.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None -p:DebugSymbols=false
          -o publish-slim

      - name: Upload slim
        uses: actions/upload-artifact@v4
        with:
          name: CH57x-설정기-slim-win-x64
          path: publish-slim/*.exe
          if-no-files-found: error

      # ──────── Portable: self-contained (~30MB) — 런타임 설치 필요 없음, 어디서나 실행.
      # WPF self-contained 는 약 60MB 가 한계 (런타임+WPF 어셈블리). 트림은 WPF 호환성 깨짐.
      - name: Publish portable (self-contained)
        run: >
          dotnet publish windows/Ch57x.App/Ch57x.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishReadyToRun=false
          -p:DebugType=None -p:DebugSymbols=false
          -o publish-portable

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: CH57x-설정기-portable-win-x64
          path: publish-portable/*.exe
          if-no-files-found: error
