<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CH57x 매크로 키보드 설정기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <h1>⌨ CH57x 키보드 설정기</h1>
      <span class="dim">9키 · 3노브 · 3레이어 — WebHID (Chrome/Edge)</span>
    </div>
    <div class="hdr-actions">
      <span id="status" class="status off">○ 미연결</span>
      <button id="connectBtn" class="primary">키보드 연결</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="profile-bar">
        <input id="profileName" placeholder="프로필 이름">
        <button id="exportBtn">내보내기</button>
        <label class="filebtn">불러오기<input id="importInput" type="file" accept="application/json" hidden></label>
        <button id="resetBtn">비우기</button>
      </div>
      <div id="layers" class="tabs"></div>
      <div id="buttonGrid" class="grid"></div>
      <div id="knobPanel" class="knobs"></div>
      <div class="upload-bar">
        <button id="uploadBtn" class="primary" disabled>키보드에 업로드</button>
        <progress id="progress" value="0" max="1" style="display:none"></progress>
        <span class="dim">업로드 시 전체 레이어를 한 번에 전송 → 부분 초기화 방지</span>
      </div>
      <details id="diagWrap" class="dbg" style="display:none">
        <summary>장치 진단 (REPORT_ID 확정용)</summary>
        <pre id="diag"></pre>
      </details>
    </section>

    <aside id="editor" class="panel editor"></aside>
  </main>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
